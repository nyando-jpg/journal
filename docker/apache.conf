<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/simple-php-login

    <Directory /var/www/simple-php-login>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    # Autoriser l'accès direct aux uploads
    <Directory /var/www/simple-php-login/uploads>
        RewriteEngine Off
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
